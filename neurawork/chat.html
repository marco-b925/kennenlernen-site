  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=chillax@500,600&f[]=satoshi@400,500,700&display=swap">
  <style>
    :root {
      --cream: #f6f5ef;
      --navy: #2a508d;
      --teal: #35d6de;
      --ink: #061026;
      --muted: #4a5878;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Satoshi, system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      background: var(--cream);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-family: Chillax, Satoshi, system-ui, sans-serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    h1 span { color: var(--navy); }
    .sub { font-size: 0.9375rem; color: var(--muted); margin-bottom: 2rem; text-align: center; max-width: 24rem; }
    .chat-card {
      width: 100%;
      max-width: 36rem;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(16px) saturate(150%);
      border: 1px solid rgba(20,35,75,0.08);
      border-radius: 2rem;
      padding: 2rem;
    }
    .back {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .back a { color: var(--navy); text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Marco <span>kennenlernen</span></h1>
  <p class="sub">Chatte oder sprich mit Marco. Der ElevenLabs-Agent ist live — klick auf den Orb unten rechts.</p>

  <div class="chat-card">
    <p style="color:var(--muted);text-align:center;">
      Klick auf den <strong style="color:var(--teal);">Voice-Orb</strong> unten rechts, um direkt mit Marco zu sprechen. Oder tippe deine Fragen — der Agent antwortet in Text und Sprache.
    </p>
  </div>

  <p class="back">&larr; <a href="bewerbung.html">Zurück zum Pitchdeck</a></p>
