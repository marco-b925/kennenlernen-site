<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Architecture — Built in ~3 Hours</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f6f5ef;
    --fg: #061026;
    --muted: #4a5878;
    --line: #dbdbdb;
    --navy: #2a508d;
    --navy-light: #e8eef6;
    --teal: #35d6de;
    --teal-light: #ecfaf8;
    --cyan: #2299c4;
    --cyan-light: #e8f5fa;
    --white: #ffffff;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.5 "Satoshi", ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  main {
    max-width: 900px;
    margin: 28px auto;
    padding: 0 18px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title { font-size: 18px; font-weight: 700; fill: var(--fg); font-family: "Chillax", "Satoshi", sans-serif; }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .tiny { font-size: 10px; fill: var(--muted); }
  .node { stroke-width: 1; }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 4; opacity: 0.7; }
  text { text-anchor: middle; }
  text.left { text-anchor: start; }
</style>
<main>
